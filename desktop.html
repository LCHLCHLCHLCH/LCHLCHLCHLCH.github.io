<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>桌面</title>
  <link rel="stylesheet" href="https://unpkg.com/xp.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(
        180deg, #3a6bc5 0%, #5b8ed8 15%, #7baedf 30%,
        #a3d4f0 50%, #c8e8f8 65%, #7db356 65%, #5a9e3a 78%, #3d7a22 100%
      );
      font-family: Tahoma, Arial, sans-serif;
      user-select: none;
    }

    /* ── 桌面图标 ── */
    .desktop-icons {
      position: absolute; top: 16px; left: 16px;
      display: flex; flex-direction: column; gap: 22px;
    }
    .desktop-icon {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      cursor: default; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
      padding: 6px 10px; border-radius: 1px; border: 1px solid transparent;
      width: 80px; position: relative;
    }
    .desktop-icon-img { width: 48px; height: 48px; position: relative; }
    .desktop-icon-img img { width: 48px; height: 48px; display: block; }
    .desktop-icon-img .icon-overlay {
      display: none; position: absolute; top: 0; left: 0;
      width: 48px; height: 48px; background: rgba(0,102,204,0.45); pointer-events: none;
    }
    .desktop-icon-label {
      font-size: 12px; text-align: center; line-height: 1.3;
      max-width: 72px; padding: 1px 4px; border: 1px dotted transparent;
    }
    .desktop-icon.selected .icon-overlay { display: block; }
    .desktop-icon.selected .desktop-icon-label {
      color: #fff; background: #3168d5; border-color: rgba(255,255,255,0.6);
    }

    /* ── 任务栏 ── */
    .taskbar {
      position: fixed; bottom: 0; left: 0; right: 0; height: 36px;
      background: linear-gradient(180deg, #2c6fc7 0%, #1e54a8 3%, #2f6fc7 15%,
        #3f87d6 50%, #255eae 85%, #1a4a9a 100%);
      border-top: 2px solid #5698e0; display: flex; align-items: center;
      padding: 0 8px; z-index: 9999;
    }
    .taskbar .start-btn {
      height: 26px; padding: 0 18px 0 8px; font-size: 12px; font-weight: bold;
      font-style: italic; color: #fff; text-shadow: 1px 1px 1px rgba(0,0,0,0.5);
      background: linear-gradient(180deg, #3f9a3a 0%, #2c7a28 50%, #1d6b1a 100%);
      border: none; border-radius: 0 12px 12px 0; cursor: pointer;
      display: flex; align-items: center; gap: 4px;
    }
    .taskbar .start-btn:hover {
      background: linear-gradient(180deg, #4cb848 0%, #389434 50%, #287d24 100%);
    }
    .taskbar .start-btn img { width: 20px; height: 20px; }
    .taskbar .taskbar-divider {
      width: 1px; height: 22px; background: #1a4a9a; margin: 0 6px;
      box-shadow: 1px 0 0 rgba(255,255,255,0.15);
    }
    .taskbar .task-item {
      height: 24px; padding: 0 12px; font-size: 11px; color: #fff;
      background: linear-gradient(180deg, #3b7ed6 0%, #2b5fae 100%);
      border: 1px solid #1a4a9a; border-radius: 2px; cursor: pointer;
      display: flex; align-items: center; gap: 4px; min-width: 120px;
    }
    .taskbar .task-item:hover {
      background: linear-gradient(180deg, #4b8ee6 0%, #3b6fbe 100%);
    }
    .taskbar .task-item img { width: 16px; height: 16px; }
    .taskbar .taskbar-tray {
      margin-left: auto; display: flex; align-items: center; gap: 6px;
      color: #fff; font-size: 11px; padding: 0 8px;
    }

    /* ── 窗口通用 ── */
    .xp-window {
      position: absolute; display: none;
    }

    /* ── 标题栏修复 ── */
    .window > .title-bar { height: 30px; font-size: 13px; }
    .window > .title-bar .title-bar-text {
      display: flex; align-items: center; gap: 5px; padding-left: 2px;
    }
    .window > .title-bar .title-bar-text img { width: 16px; height: 16px; }
    .window > .title-bar .title-bar-controls button { min-width: 21px; min-height: 21px; }

    /* ── 工具栏 ── */
    .window-toolbar {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 6px; background: #ece9d8;
      border-bottom: 1px solid #d4d0c8;
    }
    .window-toolbar .toolbar-btn {
      min-width: unset; min-height: 22px; width: 26px; height: 22px;
      padding: 0; display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .window-toolbar .address-bar {
      flex: 1; display: flex; align-items: center; gap: 4px;
      font-size: 11px; color: #000;
    }
    .window-toolbar .address-label { color: #555; white-space: nowrap; }
    .window-toolbar .address-path {
      background: #fff; border: 1px solid #7f9db9; padding: 1px 6px;
      height: 21px; line-height: 19px; flex: 1; font-size: 11px;
    }

    /* ── Explorer 布局 ── */
    .explorer-layout { display: flex; height: 320px; }
    .explorer-icons {
      flex: 1; padding: 12px; overflow-y: auto;
      display: flex; flex-wrap: wrap; align-content: flex-start;
      gap: 14px; background: #fff;
    }
    .explorer-icon-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      width: 88px; padding: 6px 4px; cursor: default; border: 1px solid transparent;
      border-radius: 2px;
    }
    .explorer-icon-item:hover { background: #e8f0fc; border-color: #c8d8f0; }
    .explorer-icon-item.selected {
      background: #3168d5; border-color: #3168d5; color: #fff;
    }
    .explorer-icon-item.selected .explorer-icon-label { color: #fff; }
    .explorer-icon-item img { width: 48px; height: 48px; }
    .explorer-icon-label {
      font-size: 11px; text-align: center; line-height: 1.3;
      color: #000; word-break: break-all; max-width: 80px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── 预览面板 ── */
    .explorer-preview {
      width: 220px; border-left: 1px solid #d4d0c8; background: #f5f4ee;
      padding: 12px; display: flex; flex-direction: column; gap: 8px;
      font-size: 11px; overflow-y: auto;
    }
    .explorer-preview .preview-title {
      font-size: 13px; font-weight: bold; color: #003399;
    }
    .explorer-preview .preview-label {
      color: #808080; font-size: 10px; text-transform: uppercase; margin-top: 4px;
    }
    .explorer-preview .preview-value { color: #222; }
    .explorer-preview .preview-empty { color: #aaa; font-style: italic; margin-top: 20px; }

    .explorer-preview .preview-open-btn {
      margin-top: auto; min-width: unset; width: 100%; text-align: center;
    }
  </style>
</head>
<body>

  <!-- 桌面图标 -->
  <div class="desktop-icons" id="desktopIcons">
    <div class="desktop-icon" data-icon="my-computer">
      <div class="desktop-icon-img">
        <img src="icons/my-computer.png" alt="我的电脑" draggable="false">
        <div class="icon-overlay"></div>
      </div>
      <div class="desktop-icon-label">我的电脑</div>
    </div>
    <div class="desktop-icon" data-icon="blog">
      <div class="desktop-icon-img">
        <img src="icons/folder-closed.png" alt="博客文章" draggable="false">
        <div class="icon-overlay"></div>
      </div>
      <div class="desktop-icon-label">博客文章</div>
    </div>
    <div class="desktop-icon" data-icon="about">
      <div class="desktop-icon-img">
        <img src="icons/information.png" alt="关于" draggable="false">
        <div class="icon-overlay"></div>
      </div>
      <div class="desktop-icon-label">关于</div>
    </div>
    <div class="desktop-icon" data-icon="recycle">
      <div class="desktop-icon-img">
        <img src="icons/recycle-bin.png" alt="回收站" draggable="false">
        <div class="icon-overlay"></div>
      </div>
      <div class="desktop-icon-label">回收站</div>
    </div>
  </div>

  <!-- 资源管理器窗口（初始隐藏） -->
  <div class="window xp-window" id="explorerWindow" style="width:700px; top:60px; left:160px;">
    <div class="title-bar" id="explorerTitleBar">
      <div class="title-bar-text">
        <img src="icons/explorer.png" alt="" draggable="false">
        博客文章
      </div>
      <div class="title-bar-controls">
        <button aria-label="Minimize"></button>
        <button aria-label="Maximize"></button>
        <button aria-label="Close" id="explorerCloseBtn"></button>
      </div>
    </div>
    <!-- 工具栏 -->
    <div class="window-toolbar">
      <button class="toolbar-btn" title="后退">←</button>
      <button class="toolbar-btn" title="前进">→</button>
      <button class="toolbar-btn" title="向上">↑</button>
      <div class="address-bar">
        <span class="address-label">地址</span>
        <span class="address-path">C:\博客文章</span>
      </div>
    </div>
    <!-- 主区域 -->
    <div class="explorer-layout">
      <div class="explorer-icons" id="explorerIcons">
        <!-- 由 JS 动态填充 -->
      </div>
      <div class="explorer-preview" id="explorerPreview">
        <p class="preview-empty">← 点击一个文件查看信息</p>
      </div>
    </div>
    <div class="status-bar">
      <div class="status-bar-field" id="explorerStatus">0 个文件</div>
    </div>
  </div>

  <!-- 任务栏 -->
  <div class="taskbar">
    <button class="start-btn">
      <img src="icons/my-computer.png" alt="" draggable="false"> 开始
    </button>
    <div class="taskbar-divider"></div>
    <div class="task-item" id="taskbarBlogBtn">
      <img src="icons/explorer.png" alt="" draggable="false"> 博客文章
    </div>
    <div class="taskbar-tray">
      <span id="clock">12:00</span>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════
    // 图标选中 / 取消选中
    // ═══════════════════════════════════════════
    (function() {
      const icons = document.querySelectorAll('.desktop-icon');
      function deselectAll() { icons.forEach(icon => icon.classList.remove('selected')); }
      icons.forEach(icon => {
        icon.addEventListener('click', function(e) {
          e.stopPropagation();
          deselectAll();
          icon.classList.add('selected');
        });
      });
      document.body.addEventListener('click', function(e) {
        if (e.target.closest('.window') || e.target.closest('.taskbar')) return;
        deselectAll();
      });
    })();

    // ═══════════════════════════════════════════
    // 窗口拖动
    // ═══════════════════════════════════════════
    function makeDraggable(winEl, titleBarEl) {
      let dragging = false, offsetX = 0, offsetY = 0;
      titleBarEl.addEventListener('mousedown', function(e) {
        if (e.target.closest('button')) return;
        dragging = true;
        const rect = winEl.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
        winEl.style.cursor = 'move';
      });
      document.addEventListener('mousemove', function(e) {
        if (!dragging) return;
        winEl.style.left = (e.clientX - offsetX) + 'px';
        winEl.style.top  = (e.clientY - offsetY) + 'px';
      });
      document.addEventListener('mouseup', function() {
        if (!dragging) return;
        dragging = false;
        winEl.style.cursor = '';
      });
    }

    // ═══════════════════════════════════════════
    // 资源管理器窗口
    // ═══════════════════════════════════════════
    (function() {
      const win = document.getElementById('explorerWindow');
      const titleBar = document.getElementById('explorerTitleBar');
      const closeBtn = document.getElementById('explorerCloseBtn');
      const iconsContainer = document.getElementById('explorerIcons');
      const previewPane = document.getElementById('explorerPreview');
      const statusField = document.getElementById('explorerStatus');

      makeDraggable(win, titleBar);

      let posts = [];
      let selectedSlug = null;

      // 关闭窗口
      closeBtn.addEventListener('click', function() { win.style.display = 'none'; });
      // 任务栏按钮也可触发
      document.getElementById('taskbarBlogBtn').addEventListener('click', function() {
        if (win.style.display === 'block') {
          win.style.display = 'none';
        } else {
          openExplorer();
        }
      });

      // 获取文件类型图标
      function getFileIcon(post) {
        if (post.type === 'html') return 'icons/information.png';
        return 'icons/folder-closed.png'; // markdown 用文件夹图标
      }

      // 打开文件的链接
      function getFileUrl(post) {
        if (post.type === 'html') return 'posts/' + post.slug + '.html';
        return 'post.html?slug=' + post.slug;
      }

      // 渲染大图标列表
      function renderIcons() {
        iconsContainer.innerHTML = '';
        posts.forEach(function(post) {
          const item = document.createElement('div');
          item.className = 'explorer-icon-item';
          item.setAttribute('data-slug', post.slug);
          item.innerHTML =
            '<img src="' + getFileIcon(post) + '" alt="" draggable="false">' +
            '<div class="explorer-icon-label">' + post.title + '</div>';

          // 单击 → 选中 + 预览
          item.addEventListener('click', function(e) {
            e.stopPropagation();
            // 取消其他选中
            iconsContainer.querySelectorAll('.explorer-icon-item.selected').forEach(function(el) {
              el.classList.remove('selected');
            });
            item.classList.add('selected');
            selectedSlug = post.slug;
            showPreview(post);
          });

          // 双击 → 打开
          item.addEventListener('dblclick', function() {
            window.open(getFileUrl(post), '_blank');
          });

          iconsContainer.appendChild(item);
        });
        statusField.textContent = posts.length + ' 个文件';
      }

      // 预览面板
      function showPreview(post) {
        var typeLabel = post.type === 'markdown' ? 'Markdown 文档' : 'HTML 页面';
        previewPane.innerHTML =
          '<div class="preview-title">' + post.title + '</div>' +
          '<div class="preview-label">类型</div>' +
          '<div class="preview-value">' + typeLabel + '</div>' +
          '<div class="preview-label">日期</div>' +
          '<div class="preview-value">' + post.date + '</div>' +
          '<div class="preview-label">摘要</div>' +
          '<div class="preview-value">' + post.summary + '</div>' +
          '<button class="preview-open-btn" onclick="window.open(\'' + getFileUrl(post) + '\',\'_blank\')">打开</button>';
      }

      // 点击图标区域空白 → 取消预览
      iconsContainer.addEventListener('click', function(e) {
        if (e.target === iconsContainer) {
          iconsContainer.querySelectorAll('.explorer-icon-item.selected').forEach(function(el) {
            el.classList.remove('selected');
          });
          selectedSlug = null;
          previewPane.innerHTML = '<p class="preview-empty">← 点击一个文件查看信息</p>';
        }
      });

      window.openExplorer = function() {
        if (win.style.display === 'block') {
          // 已经打开，置顶即可
          win.style.zIndex = parseInt(win.style.zIndex || 100) + 1;
          return;
        }
        // 首次打开 → 加载数据
        fetch('posts/index.json')
          .then(function(r) { return r.json(); })
          .then(function(data) {
            posts = data;
            renderIcons();
            previewPane.innerHTML = '<p class="preview-empty">← 点击一个文件查看信息</p>';
            win.style.display = 'block';
            win.style.zIndex = 200;
          })
          .catch(function(err) {
            posts = [];
            renderIcons();
            previewPane.innerHTML = '<p class="preview-empty" style="color:red">加载失败: ' + err.message + '</p>';
            win.style.display = 'block';
            win.style.zIndex = 200;
          });
      };
    })();

    // ═══════════════════════════════════════════
    // 桌面图标双击
    // ═══════════════════════════════════════════
    (function() {
      var blogIcon = document.querySelector('.desktop-icon[data-icon="blog"]');
      if (blogIcon) {
        blogIcon.addEventListener('dblclick', function() {
          if (typeof openExplorer === 'function') openExplorer();
        });
      }
    })();

    // ═══════════════════════════════════════════
    // 时钟
    // ═══════════════════════════════════════════
    function updateClock() {
      var now = new Date();
      document.getElementById('clock').textContent =
        now.getHours().toString().padStart(2, '0') + ':' +
        now.getMinutes().toString().padStart(2, '0');
    }
    updateClock();
    setInterval(updateClock, 30000);
  </script>
</body>
</html>
