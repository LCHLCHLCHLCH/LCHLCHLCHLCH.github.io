<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>桌面</title>
  <link rel="stylesheet" href="https://unpkg.com/xp.css">
  <link rel="stylesheet" href="css/desktop.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

  <!-- 桌面图标 -->
  <div class="desktop-icons" id="desktopIcons">
    <div class="desktop-icon" data-icon="my-computer">
      <div class="desktop-icon-img">
        <img src="icons/my-computer.png" alt="我的电脑" draggable="false">
        <div class="icon-overlay"></div>
      </div>
      <div class="desktop-icon-label">我的电脑</div>
    </div>
    <div class="desktop-icon" data-icon="blog">
      <div class="desktop-icon-img">
        <img src="icons/folder-closed.png" alt="博客文章" draggable="false">
        <div class="icon-overlay"></div>
      </div>
      <div class="desktop-icon-label">博客文章</div>
    </div>
    <div class="desktop-icon" data-icon="about">
      <div class="desktop-icon-img">
        <img src="icons/information.png" alt="关于" draggable="false">
        <div class="icon-overlay"></div>
      </div>
      <div class="desktop-icon-label">关于</div>
    </div>
    <div class="desktop-icon" data-icon="ie">
      <div class="desktop-icon-img">
        <img src="icons/ie.png" alt="IE 浏览器" draggable="false">
        <div class="icon-overlay"></div>
      </div>
      <div class="desktop-icon-label">Internet Explorer</div>
    </div>
    <div class="desktop-icon" data-icon="control-panel">
      <div class="desktop-icon-img">
        <img src="icons/control-panel.png" alt="控制面板" draggable="false">
        <div class="icon-overlay"></div>
      </div>
      <div class="desktop-icon-label">控制面板</div>
    </div>
    <div class="desktop-icon" data-icon="github">
      <div class="desktop-icon-img">
        <img src="icons/github.png" alt="GitHub" draggable="false">
        <div class="icon-overlay"></div>
      </div>
      <div class="desktop-icon-label">GitHub</div>
    </div>
  </div>

  <!-- 所有窗口由 JS 动态创建 -->
  <div id="windowContainer"></div>

  <script src="js/desktop.js"></script>
</body>
</html>
