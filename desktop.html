<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>桌面</title>
  <link rel="stylesheet" href="https://unpkg.com/xp.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw; height: 100vh; overflow: hidden;
      background: linear-gradient(180deg,
        #3a6bc5 0%, #5b8ed8 15%, #7baedf 30%,
        #a3d4f0 50%, #c8e8f8 65%, #7db356 65%, #5a9e3a 78%, #3d7a22 100%);
      font-family: Tahoma, Arial, sans-serif; user-select: none;
    }

    /* ── 桌面图标 ── */
    .desktop-icons {
      position: absolute; top: 16px; left: 16px;
      display: flex; flex-direction: column; gap: 22px;
    }
    .desktop-icon {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      cursor: default; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
      padding: 6px 10px; border-radius: 1px; border: 1px solid transparent;
      width: 80px; position: relative;
    }
    .desktop-icon-img { width: 48px; height: 48px; position: relative; }
    .desktop-icon-img img { width: 48px; height: 48px; display: block; }
    .desktop-icon-img .icon-overlay {
      display: none; position: absolute; top: 0; left: 0;
      width: 48px; height: 48px; background: rgba(0,102,204,0.45); pointer-events: none;
    }
    .desktop-icon-label {
      font-size: 12px; text-align: center; line-height: 1.3;
      max-width: 72px; padding: 1px 4px; border: 1px dotted transparent;
    }
    .desktop-icon.selected .icon-overlay { display: block; }
    .desktop-icon.selected .desktop-icon-label {
      color: #fff; background: #3168d5; border-color: rgba(255,255,255,0.6);
    }

    /* ── 任务栏 ── */
    .taskbar {
      position: fixed; bottom: 0; left: 0; right: 0; height: 36px;
      background: linear-gradient(180deg, #2c6fc7 0%, #1e54a8 3%, #2f6fc7 15%,
        #3f87d6 50%, #255eae 85%, #1a4a9a 100%);
      border-top: 2px solid #5698e0; display: flex; align-items: center;
      padding: 0 8px; z-index: 9999;
    }
    .taskbar .start-btn {
      height: 26px; padding: 0 18px 0 8px; font-size: 12px; font-weight: bold;
      font-style: italic; color: #fff; text-shadow: 1px 1px 1px rgba(0,0,0,0.5);
      background: linear-gradient(180deg, #3f9a3a 0%, #2c7a28 50%, #1d6b1a 100%);
      border: none; border-radius: 0 12px 12px 0; cursor: pointer;
      display: flex; align-items: center; gap: 4px;
    }
    .taskbar .start-btn:hover {
      background: linear-gradient(180deg, #4cb848 0%, #389434 50%, #287d24 100%);
    }
    .taskbar .start-btn img { width: 20px; height: 20px; }
    .taskbar .taskbar-divider {
      width: 1px; height: 22px; background: #1a4a9a; margin: 0 6px;
      box-shadow: 1px 0 0 rgba(255,255,255,0.15);
    }
    .taskbar .task-items { display: flex; gap: 4px; flex: 1; overflow: hidden; }
    .taskbar .task-item {
      height: 24px; padding: 0 12px; font-size: 11px; color: #fff;
      background: linear-gradient(180deg, #3b7ed6 0%, #2b5fae 100%);
      border: 1px solid #1a4a9a; border-radius: 2px; cursor: pointer;
      display: flex; align-items: center; gap: 4px; white-space: nowrap;
    }
    .taskbar .task-item:hover {
      background: linear-gradient(180deg, #4b8ee6 0%, #3b6fbe 100%);
    }
    .taskbar .task-item img { width: 16px; height: 16px; }
    .taskbar .taskbar-tray {
      margin-left: auto; display: flex; align-items: center; gap: 6px;
      color: #fff; font-size: 11px; padding: 0 8px;
    }

    /* ── 所有桌面窗口 ── */
    .desktop-window {
      position: absolute; display: none;
    }
    .window > .title-bar { height: 30px; font-size: 13px; }
    .window > .title-bar .title-bar-text {
      display: flex; align-items: center; gap: 5px; padding-left: 2px;
    }
    .window > .title-bar .title-bar-text img { width: 16px; height: 16px; }
    .window > .title-bar .title-bar-controls button { min-width: 21px; min-height: 21px; }

    /* ── Explorer 布局 ── */
    .explorer-layout { display: flex; height: 320px; }
    .explorer-icons {
      flex: 1; padding: 12px; overflow-y: auto;
      display: flex; flex-wrap: wrap; align-content: flex-start;
      gap: 14px; background: #fff;
    }
    .explorer-icon-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      width: 88px; padding: 6px 4px; cursor: default;
      border: 1px solid transparent; border-radius: 2px;
    }
    .explorer-icon-item:hover { background: #e8f0fc; border-color: #c8d8f0; }
    .explorer-icon-item.selected {
      background: #3168d5; border-color: #3168d5; color: #fff;
    }
    .explorer-icon-item.selected .explorer-icon-label { color: #fff; }
    .explorer-icon-item img { width: 48px; height: 48px; }
    .explorer-icon-label {
      font-size: 11px; text-align: center; line-height: 1.3;
      color: #000; word-break: break-all; max-width: 80px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .explorer-preview {
      width: 200px; border-left: 1px solid #d4d0c8; background: #f5f4ee;
      padding: 12px; display: flex; flex-direction: column; gap: 6px;
      font-size: 11px; overflow-y: auto;
    }
    .explorer-preview .preview-title { font-size: 13px; font-weight: bold; color: #003399; }
    .explorer-preview .preview-label { color: #808080; font-size: 10px; margin-top: 4px; }
    .explorer-preview .preview-value { color: #222; }
    .explorer-preview .preview-empty { color: #aaa; font-style: italic; margin-top: 20px; }

    /* ── 内容窗口正文样式 ── */
    .content-body {
      padding: 14px 18px; max-height: 55vh; overflow-y: auto;
      font-size: 12px; line-height: 1.7;
    }
    .content-body h1 { font-size: 1.5rem; margin-bottom: 8px; }
    .content-body h2 { font-size: 1.2rem; margin: 16px 0 8px; color: #003399;
      border-bottom: 1px solid #d4d0c8; padding-bottom: 4px; }
    .content-body h3 { font-size: 1.05rem; margin: 12px 0 6px; }
    .content-body p { margin: 6px 0; }
    .content-body ul, .content-body ol { margin: 6px 0 6px 22px; }
    .content-body li { margin: 2px 0; }
    .content-body code { font-family: "Perfect DOS VGA 437 Win", monospace;
      background: #d4d0c8; padding: 1px 4px; font-size: 0.9em; }
    .content-body pre { background: #000; color: silver; padding: 10px; overflow-x: auto;
      font-family: "Perfect DOS VGA 437 Win", monospace; font-size: 0.85rem; margin: 8px 0; }
    .content-body pre code { background: none; padding: 0; color: inherit; }
    .content-body blockquote { border-left: 3px solid #7f9db9;
      padding: 2px 10px; margin: 8px 0; color: #555; background: #f0f0f0; }
    .content-body table { border-collapse: collapse; width: 100%; margin: 8px 0; }
    .content-body th, .content-body td { border: 1px solid #808080; padding: 3px 6px; font-size: 0.9rem; }
    .content-body th { background: #d4d0c8; }
    .content-body hr { border: none; border-top: 1px solid #808080; margin: 12px 0; }

    /* iframe 窗口 */
    .iframe-body { padding: 0; overflow: hidden; }
    .iframe-body iframe { width: 100%; height: 55vh; border: none; }
  </style>
</head>
<body>

  <!-- 桌面图标 -->
  <div class="desktop-icons" id="desktopIcons">
    <div class="desktop-icon" data-icon="my-computer">
      <div class="desktop-icon-img">
        <img src="icons/my-computer.png" alt="我的电脑" draggable="false">
        <div class="icon-overlay"></div>
      </div>
      <div class="desktop-icon-label">我的电脑</div>
    </div>
    <div class="desktop-icon" data-icon="blog">
      <div class="desktop-icon-img">
        <img src="icons/folder-closed.png" alt="博客文章" draggable="false">
        <div class="icon-overlay"></div>
      </div>
      <div class="desktop-icon-label">博客文章</div>
    </div>
    <div class="desktop-icon" data-icon="about">
      <div class="desktop-icon-img">
        <img src="icons/information.png" alt="关于" draggable="false">
        <div class="icon-overlay"></div>
      </div>
      <div class="desktop-icon-label">关于</div>
    </div>
    <div class="desktop-icon" data-icon="recycle">
      <div class="desktop-icon-img">
        <img src="icons/recycle-bin.png" alt="回收站" draggable="false">
        <div class="icon-overlay"></div>
      </div>
      <div class="desktop-icon-label">回收站</div>
    </div>
  </div>

  <!-- 所有窗口由 JS 动态创建 -->
  <div id="windowContainer"></div>

  <!-- 任务栏 -->
  <div class="taskbar">
    <button class="start-btn">
      <img src="icons/my-computer.png" alt="" draggable="false"> 开始
    </button>
    <div class="taskbar-divider"></div>
    <div class="task-items" id="taskbarItems"></div>
    <div class="taskbar-tray">
      <span id="clock">12:00</span>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════
    // 图标选中
    // ═══════════════════════════════════════════
    (function() {
      var icons = document.querySelectorAll('.desktop-icon');
      function deselectAll() { icons.forEach(function(icon) { icon.classList.remove('selected'); }); }
      icons.forEach(function(icon) {
        icon.addEventListener('click', function(e) {
          e.stopPropagation();
          deselectAll();
          icon.classList.add('selected');
        });
      });
      document.body.addEventListener('click', function(e) {
        if (e.target.closest('.window') || e.target.closest('.taskbar')) return;
        deselectAll();
      });
    })();

    // ═══════════════════════════════════════════
    // 窗口管理器
    // ═══════════════════════════════════════════
    var wm = (function() {
      var container = document.getElementById('windowContainer');
      var taskbarItems = document.getElementById('taskbarItems');
      var windows = {};   // id → { el, taskBtn }
      var zCounter = 100;

      function bringToFront(el) {
        el.style.zIndex = ++zCounter;
      }

      function makeDraggable(el, titleBar) {
        var dragging = false, ox = 0, oy = 0;
        titleBar.addEventListener('mousedown', function(e) {
          if (e.target.closest('button')) return;
          dragging = true;
          var r = el.getBoundingClientRect();
          ox = e.clientX - r.left;
          oy = e.clientY - r.top;
          el.style.cursor = 'move';
          bringToFront(el);
        });
        document.addEventListener('mousemove', function(e) {
          if (!dragging) return;
          el.style.left = (e.clientX - ox) + 'px';
          el.style.top  = (e.clientY - oy) + 'px';
        });
        document.addEventListener('mouseup', function() {
          if (dragging) { dragging = false; el.style.cursor = ''; }
        });
      }

      function createTaskBtn(id, title, iconUrl) {
        var btn = document.createElement('div');
        btn.className = 'task-item';
        btn.innerHTML = '<img src="' + iconUrl + '" alt="" draggable="false">' + title;
        btn.onclick = function() {
          var w = windows[id];
          if (!w) return;
          if (w.el.style.display === 'block') {
            w.el.style.display = 'none';
          } else {
            w.el.style.display = 'block';
            bringToFront(w.el);
          }
        };
        taskbarItems.appendChild(btn);
        return btn;
      }

      function removeTaskBtn(btn) {
        if (btn && btn.parentNode) btn.parentNode.removeChild(btn);
      }

      // 创建窗口骨架
      function create(id, title, iconUrl, width, top, left) {
        // 如果已存在则置顶
        if (windows[id]) {
          var ex = windows[id];
          ex.el.style.display = 'block';
          bringToFront(ex.el);
          return ex.el;
        }

        var el = document.createElement('div');
        el.className = 'window desktop-window';
        el.style.width = width + 'px';
        el.style.top = top + 'px';
        el.style.left = left + 'px';

        el.innerHTML =
          '<div class="title-bar win-titlebar">' +
            '<div class="title-bar-text">' +
              '<img src="' + iconUrl + '" alt="" draggable="false">' +
              title +
            '</div>' +
            '<div class="title-bar-controls">' +
              '<button aria-label="Minimize"></button>' +
              '<button aria-label="Maximize"></button>' +
              '<button aria-label="Close" class="win-close"></button>' +
            '</div>' +
          '</div>' +
          '<div class="window-body win-body"></div>';
        // 初始: 不显示
        el.style.display = 'none';
        container.appendChild(el);

        var titleBar = el.querySelector('.win-titlebar');
        var bodyEl = el.querySelector('.win-body');
        var closeBtn = el.querySelector('.win-close');
        var taskBtn = createTaskBtn(id, title, iconUrl);

        makeDraggable(el, titleBar);

        closeBtn.addEventListener('click', function() {
          el.style.display = 'none';
        });

        // 点击窗口任意位置 → 置顶
        el.addEventListener('mousedown', function() {
          bringToFront(el);
        });

        windows[id] = { el: el, body: bodyEl, taskBtn: taskBtn, titleBar: titleBar };

        // 显示
        el.style.display = 'block';
        bringToFront(el);

        return el;
      }

      function getBodyEl(id) {
        return windows[id] ? windows[id].body : null;
      }

      function setBodyHTML(id, html) {
        var b = getBodyEl(id);
        if (b) b.innerHTML = html;
      }

      function closeWindow(id) {
        var w = windows[id];
        if (!w) return;
        w.el.style.display = 'none';
      }

      return { create: create, getBody: getBodyEl, setBody: setBodyHTML, close: closeWindow, bringToFront: bringToFront };
    })();

    // ═══════════════════════════════════════════
    // 资源管理器（博客文章文件夹）
    // ═══════════════════════════════════════════
    (function() {
      var EXPLORER_ID = 'explorer';
      var posts = [];
      var selectedSlug = null;

      function getFileIcon(post) {
        return post.type === 'html' ? 'icons/information.png' : 'icons/folder-closed.png';
      }

      function renderIcons(iconsContainer, previewPane, statusField) {
        iconsContainer.innerHTML = '';
        posts.forEach(function(post) {
          var item = document.createElement('div');
          item.className = 'explorer-icon-item';
          item.setAttribute('data-slug', post.slug);
          item.innerHTML =
            '<img src="' + getFileIcon(post) + '" alt="" draggable="false">' +
            '<div class="explorer-icon-label">' + post.title + '</div>';

          item.addEventListener('click', function(e) {
            e.stopPropagation();
            iconsContainer.querySelectorAll('.explorer-icon-item.selected').forEach(function(el) {
              el.classList.remove('selected');
            });
            item.classList.add('selected');
            selectedSlug = post.slug;
            showPreview(post, previewPane);
          });

          item.addEventListener('dblclick', function() {
            if (post.type === 'markdown') {
              openMarkdownWindow(post);
            } else {
              openHtmlWindow(post);
            }
          });

          iconsContainer.appendChild(item);
        });
        statusField.textContent = posts.length + ' 个文件';
      }

      function showPreview(post, previewPane) {
        var typeLabel = post.type === 'markdown' ? 'Markdown 文档' : 'HTML 页面';
        previewPane.innerHTML =
          '<div class="preview-title">' + post.title + '</div>' +
          '<div class="preview-label">类型</div>' +
          '<div class="preview-value">' + typeLabel + '</div>' +
          '<div class="preview-label">日期</div>' +
          '<div class="preview-value">' + post.date + '</div>' +
          '<div class="preview-label">摘要</div>' +
          '<div class="preview-value">' + post.summary + '</div>';
      }

      function openMarkdownWindow(post) {
        var winId = 'post-' + post.slug;
        var el = wm.create(winId, post.title + ' - 记事本', 'icons/folder-closed.png', 580, 60 + Math.random() * 80, 180 + Math.random() * 60);
        var body = wm.getBody(winId);
        body.innerHTML = '<div class="content-body"><p style="color:#808080">加载中…</p></div>';

        fetch('posts/' + post.slug + '.md')
          .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
          .then(function(md) {
            wm.setBody(winId, '<div class="content-body">' + marked.parse(md) + '</div>');
          })
          .catch(function(err) {
            wm.setBody(winId, '<div class="content-body"><p style="color:red">加载失败: ' + err.message + '</p></div>');
          });
      }

      function openHtmlWindow(post) {
        var winId = 'post-' + post.slug;
        var el = wm.create(winId, post.title + ' - Internet Explorer', 'icons/information.png', 640, 60 + Math.random() * 80, 160 + Math.random() * 60);
        wm.setBody(winId, '<div class="iframe-body"><iframe src="posts/' + post.slug + '.html"></iframe></div>');
      }

      window.openExplorer = function() {
        var el = wm.create(EXPLORER_ID, '博客文章', 'icons/explorer.png', 700, 60, 160);
        var body = wm.getBody(EXPLORER_ID);

        if (posts.length === 0) {
          // 首次加载
          body.innerHTML =
            '<div class="explorer-layout">' +
              '<div class="explorer-icons" id="explorerIcons"></div>' +
              '<div class="explorer-preview" id="explorerPreview"><p class="preview-empty">← 点击文件查看信息</p></div>' +
            '</div>' +
            '<div class="status-bar"><div class="status-bar-field" id="explorerStatus">0 个文件</div></div>';

          fetch('posts/index.json')
            .then(function(r) { return r.json(); })
            .then(function(data) {
              posts = data;
              renderIcons(
                body.querySelector('#explorerIcons'),
                body.querySelector('#explorerPreview'),
                body.querySelector('#explorerStatus')
              );
            })
            .catch(function() {
              body.querySelector('#explorerPreview').innerHTML = '<p class="preview-empty" style="color:red">加载失败</p>';
            });
        } else {
          // 已加载过数据，重建 DOM
          body.innerHTML =
            '<div class="explorer-layout">' +
              '<div class="explorer-icons" id="explorerIcons"></div>' +
              '<div class="explorer-preview" id="explorerPreview"><p class="preview-empty">← 点击文件查看信息</p></div>' +
            '</div>' +
            '<div class="status-bar"><div class="status-bar-field" id="explorerStatus">0 个文件</div></div>';
          renderIcons(
            body.querySelector('#explorerIcons'),
            body.querySelector('#explorerPreview'),
            body.querySelector('#explorerStatus')
          );
        }
      };
    })();

    // ═══════════════════════════════════════════
    // 桌面图标双击
    // ═══════════════════════════════════════════
    (function() {
      var blogIcon = document.querySelector('.desktop-icon[data-icon="blog"]');
      if (blogIcon) {
        blogIcon.addEventListener('dblclick', function() {
          openExplorer();
        });
      }
    })();

    // ═══════════════════════════════════════════
    // 时钟
    // ═══════════════════════════════════════════
    function updateClock() {
      var now = new Date();
      document.getElementById('clock').textContent =
        now.getHours().toString().padStart(2, '0') + ':' +
        now.getMinutes().toString().padStart(2, '0');
    }
    updateClock();
    setInterval(updateClock, 30000);
  </script>
</body>
</html>
