<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LCH 的博客</title>
  <link rel="stylesheet" href="https://unpkg.com/xp.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ece9d8;
      font-family: Tahoma, Arial, sans-serif;
      min-height: 100vh;
      --content-font-size: 14px;
    }

    /* ── 顶部标题栏 ── */
    .header {
      background: linear-gradient(180deg,
        rgba(9,151,255,1) 0%, rgba(0,83,238,1) 8%,
        rgba(0,80,238,1) 40%, rgba(0,102,255,1) 88%,
        rgba(0,91,255,1) 95%, rgba(0,61,215,1) 100%);
      padding: 10px 14px;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      text-shadow: 1px 1px #0f1089;
      display: flex; align-items: center; gap: 10px;
    }
    .header img { width: 32px; height: 32px; }
    .header .subtitle {
      font-size: 11px; font-weight: normal;
      opacity: 0.85; margin-top: 2px;
    }

    /* ── 文章列表 ── */
    .post-list {
      padding: 14px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .post-card {
      background: #fff;
      box-shadow: inset -1px -1px #0a0a0a, inset 1px 1px #fff,
                  inset -2px -2px grey, inset 2px 2px #dfdfdf;
      padding: 14px; border-radius: 2px;
      cursor: pointer;
    }
    .post-card:active {
      box-shadow: inset -1px -1px #fff, inset 1px 1px #0a0a0a,
                  inset -2px -2px #dfdfdf, inset 2px 2px grey;
    }
    .post-card h2 {
      font-size: 16px; color: #003399; margin-bottom: 4px;
    }
    .post-card .post-date {
      font-size: 11px; color: #808080; margin-bottom: 8px;
    }
    .post-card .post-summary {
      font-size: var(--content-font-size);
      color: #333; line-height: 1.6;
    }

    /* ── 底部工具栏 ── */
    .footer {
      background: #d4d0c8;
      border-top: 2px solid #fff;
      padding: 8px 14px;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 11px; color: #444;
      position: sticky; bottom: 0;
    }
    .footer select {
      font-family: Tahoma, sans-serif; font-size: 11px;
      padding: 2px 4px; min-width: 80px;
    }
    .footer a { color: #003399; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    .loading { color: #808080; font-style: italic; padding: 20px; text-align: center; }
  </style>
</head>
<body>

  <!-- 顶部 -->
  <div class="header">
    <img src="icons/my-computer.png" alt="" draggable="false">
    <div>
      <div>LCH 的博客</div>
      <div class="subtitle">Windows XP 风格</div>
    </div>
  </div>

  <!-- 文章列表 -->
  <div class="post-list" id="postList">
    <p class="loading">加载中…</p>
  </div>

  <!-- 底部 -->
  <div class="footer">
    <span>字体
      <select id="fontSizeSelect">
        <option value="12px">小</option>
        <option value="14px" selected>中</option>
        <option value="16px">大</option>
        <option value="18px">很大</option>
      </select>
    </span>
    <a href="https://github.com/LCHLCHLCHLCH" target="_blank">GitHub ↗</a>
  </div>

  <script>
    // ═══════════════════════════════════════════
    // 加载文章列表
    // ═══════════════════════════════════════════
    (function() {
      var postList = document.getElementById('postList');

      fetch('posts/index.json')
        .then(function(r) { return r.json(); })
        .then(function(posts) {
          var mdPosts = posts.filter(function(p) { return p.type === 'markdown'; });
          if (mdPosts.length === 0) {
            postList.innerHTML = '<p class="loading">暂无文章</p>';
            return;
          }
          postList.innerHTML = '';
          mdPosts.forEach(function(post) {
            var card = document.createElement('div');
            card.className = 'post-card';
            card.innerHTML =
              '<h2>' + post.title + '</h2>' +
              '<div class="post-date">' + post.date + '</div>' +
              '<div class="post-summary">' + post.summary + '</div>';
            card.addEventListener('click', function() {
              window.location.href = 'post.html?slug=' + post.slug;
            });
            postList.appendChild(card);
          });
        })
        .catch(function() {
          postList.innerHTML = '<p class="loading" style="color:red">加载失败</p>';
        });
    })();

    // ═══════════════════════════════════════════
    // 字体大小
    // ═══════════════════════════════════════════
    (function() {
      var select = document.getElementById('fontSizeSelect');

      try {
        var saved = localStorage.getItem('xp-mobile-font-size');
        if (saved) {
          document.body.style.setProperty('--content-font-size', saved);
          select.value = saved;
        }
      } catch(e) {}

      select.addEventListener('change', function() {
        document.body.style.setProperty('--content-font-size', select.value);
        try { localStorage.setItem('xp-mobile-font-size', select.value); } catch(e) {}
      });
    })();
  </script>
</body>
</html>
