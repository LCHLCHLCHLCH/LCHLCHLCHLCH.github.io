# Hexo Configuration
title: LCH 的博客
subtitle: ''
description: 个人博客
author: LCH
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://lchlchlchlch.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
  lang: zh-CN

# Directory
source_dir: source
public_dir: docs

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
filename_case: 0
highlight:
  enable: true
  line_number: false

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss

# Pagination
index_generator:
  per_page: 10
  order_by: -date

archive_generator:
  per_page: 0
  yearly: true
  monthly: true

# Theme
theme: xp-blog

# Deployment
deploy:
  type: ''
