    <style>
        m{
            transition:box-shadow 0s;

        }
        m:hover{
            box-shadow: 5px 5px 5px 0px ;
            width: 610px;

        }
        @keyframes ani{
            0%      {transform: rotate(0deg);}
            25%     {transform: rotate(90deg);}
            50%     {transform: rotate(180deg);}
            75%     {transform: rotate(270deg);}
            100%    {transform: rotate(360deg);}
        }
    </style>
