    <div class="main">
        <h1 style="text-align: center;">2022.8.17</h1>
        <p>
            &emsp;&emsp;今天芳芳让背作文。我成功地背了下来，并在全班面前背了一遍。芳芳让我下午去领赏。
        </p>
        <p>
            &emsp;&emsp;今天语文作业是给同桌出一份默写题。我给张璟悦出了<a href="../poembeta">《世家公主行》</a>里的一句诗。
        </p>
        <p>
            &emsp;&emsp;今天芳芳奖励了我一个黄桃。
        </p>
        <p>
            &emsp;&emsp;今天状态低迷，化学题几乎全不会做。
        </p>
    </div>
