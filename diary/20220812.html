<body style="background-color:#d6ecf0;">
    <div class="main">
        <div style="
            width: 300px;
            height:50px;
            background-color:aliceblue;
            margin: auto;
            box-shadow: inset 0px 0px 10px;
            margin-bottom: 10px;
            ">
            <div style="text-align: center;line-height: 50px;">
                2022.8.9
            </div>
        </div>
        <div style="
        width: 500px;
        height:auto;
        background-color:#e9e7ef;
        margin: auto;
        box-shadow: inset 0px 0px 10px;
        padding: 10px;
        ;">
        <div style="line-height: 150%;">
            &emsp;&emsp;今天早操时排了课间操的队形。</br>
            &emsp;&emsp;祁鑫给每个人发了一张便利贴，让我们给霍燕清写生日祝福语。我写的是“长命百岁，早生贵子”。</br>
            &emsp;&emsp;今天哲哲给王佳怡作了一首七言长诗。如果有机会我要抄下来。</br>
            &emsp;&emsp;今天芳芳进行了有趣的问答比赛。我及时地从bird组溜到了dolphin组。最后bird组得了0分，dolphin组得了4分，排第二。</br>
            &emsp;&emsp;今天杜羽佳让秦炜轩给赵海翔送一封信，秦就转交给我了。我把信交给赵的时候在班里引起了轰动（虽然信里只有一道圆锥曲线）</br>
            &emsp;&emsp;今天霍燕清过生日，祁鑫买了一个大蛋糕，我们在班里分吃了。</br>
            &emsp;&emsp;今天用完一根蓝笔芯。
            
        </div>
        </div>
    </div>
